services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required (see .env.example)}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (see .env.example)}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required (see .env.example)}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  jaeger:
    image: jaegertracing/all-in-one:latest
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${OTLP_GRPC_PORT:-4317}:4317"

  api:
    build:
      context: ./convert-invert
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required (see .env.example)}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SERVER_BIND: 0.0.0.0:3124
      JAEGER_URL: http://jaeger:16686
      OTLP_ENDPOINT: http://jaeger:4317
      DOWNLOAD_PATH: /downloads
      API_KEY: ${API_KEY:?API_KEY is required — generate with `openssl rand -hex 32`}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      USER_NAME: ${USER_NAME:?USER_NAME is required}
      USER_PASSWORD: ${USER_PASSWORD:?USER_PASSWORD is required}
      LISTEN_PORT: ${LISTEN_PORT:-41000}
      CLIENT_ID: ${CLIENT_ID:?CLIENT_ID is required}
      CLIENT_SECRET: ${CLIENT_SECRET:?CLIENT_SECRET is required}
      RUN_ID: ${RUN_ID:-compose}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SHARE_MODE: ${SHARE_MODE:-external}
      SHARE_PATH: ${SHARE_PATH:-/downloads}
      # Soulseek I/O (search + download + share) is delegated to the aioslsk engine service.
      SLSK_URL: ${SLSK_URL:-http://slsk:8080}
      # Worker + search/download tuning (overridable from .env; defaults match the code).
      WORKER_COUNT: ${WORKER_COUNT:-1}
      WORKER_ACCOUNT_MODE: ${WORKER_ACCOUNT_MODE:-same}
      SEARCH_CONCURRENCY: ${SEARCH_CONCURRENCY:-1}
      DOWNLOAD_CONCURRENCY: ${DOWNLOAD_CONCURRENCY:-1}
      SEARCH_TIMEOUT_SECS: ${SEARCH_TIMEOUT_SECS:-20}
      SEARCH_EMPTY_RESULT_CUTOFF: ${SEARCH_EMPTY_RESULT_CUTOFF:-8}
      MAX_CANDIDATES_PER_TRACK: ${MAX_CANDIDATES_PER_TRACK:-8}
      MAX_DOWNLOAD_ATTEMPTS_PER_TRACK: ${MAX_DOWNLOAD_ATTEMPTS_PER_TRACK:-4}
      CANDIDATE_COLLECTION_SECS: ${CANDIDATE_COLLECTION_SECS:-20}
      MAX_SEARCH_PASSES_PER_TRACK: ${MAX_SEARCH_PASSES_PER_TRACK:-2}
      MAX_REQUESTS_PER_TRACK: ${MAX_REQUESTS_PER_TRACK:-8}
      # Anti-ban pacing (0 disables).
      RETRY_BACKOFF_MS: ${RETRY_BACKOFF_MS:-1000}
      SEARCH_PACING_MS: ${SEARCH_PACING_MS:-500}
      PEER_COOLDOWN_SECS: ${PEER_COOLDOWN_SECS:-120}
      # Download inactivity timeouts — free a stuck slot so it can't clog the pipeline (0 disables).
      DOWNLOAD_QUEUED_TIMEOUT_SECS: ${DOWNLOAD_QUEUED_TIMEOUT_SECS:-45}
      DOWNLOAD_STALL_TIMEOUT_SECS: ${DOWNLOAD_STALL_TIMEOUT_SECS:-30}
      DOWNLOAD_HARD_TIMEOUT_SECS: ${DOWNLOAD_HARD_TIMEOUT_SECS:-180}
    ports:
      - "${API_PORT:-3124}:3124"
    volumes:
      - ${DOWNLOADS_DIR:-/srv/storage/downloads}:/downloads
    depends_on:
      slsk:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started

  frontend:
    build:
      context: ./convert-invert-frontend
      args:
        VITE_API_KEY: ${API_KEY:?API_KEY is required}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      api:
        condition: service_started

  # Soulseek engine (aioslsk): one login does search + download + share. The Rust api
  # delegates all Soulseek I/O here over HTTP (SLSK_URL). aioslsk's server-brokered
  # connections make transfers work from behind NAT/CGNAT. It owns the Soulseek listen port
  # (published so peers can connect); the internal HTTP API (8080) is not published.
  slsk:
    build:
      context: ./convert-host-downloads
    restart: unless-stopped
    environment:
      USER_NAME: ${USER_NAME:?USER_NAME is required}
      USER_PASSWORD: ${USER_PASSWORD:?USER_PASSWORD is required}
      SHARE_PATH: /downloads
      LISTEN_PORT: ${LISTEN_PORT:-41000}
      HEALTH_BIND: 0.0.0.0:8080
      RESCAN_INTERVAL_SECS: ${SHARE_RESCAN_INTERVAL_SECS:-120}
    ports:
      - "${LISTEN_PORT:-41000}:${LISTEN_PORT:-41000}"
      - "${LISTEN_PORT_OBFUSCATED:-41001}:${LISTEN_PORT_OBFUSCATED:-41001}"
    volumes:
      - ${DOWNLOADS_DIR:-/srv/storage/downloads}:/downloads
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
  redis_data:
